networks:
  dev:

services:
  app:
    networks:
      - dev
    depends_on:
      database:
        condition: service_healthy
    build:
      context: ./
    command: --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      PSQL_HOST: database
      PSQL_PORT: 5432
      MINIO_HOST: http://minio
    restart: unless-stopped
  database:
    networks:
      - dev
    image: postgres:15-alpine
    ports:
      - "${PSQL_EXT_PORT}:5432"
    environment:
      POSTGRES_DB: ${PSQL_DB}
      POSTGRES_USER: ${PSQL_USER}
      POSTGRES_PASSWORD: ${PSQL_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 3s
    restart: unless-stopped
  minio:
    networks:
      - dev
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: unless-stopped
  createbuckets:
    networks:
      - dev
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb myminio/${MINIO_BUCKET} || true;
      /usr/bin/mc anonymous set none myminio/${MINIO_BUCKET};
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
